[tool.ruff]
target-version = "py313"
line-length = 100
src = ["apps/orchestrator"]
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "migrations/versions",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
  "B008",   # FastAPI: Depends() in function default is the standard pattern
  "E402",   # Module-level import not at top — intentional for conditional imports
  "E501",   # Line too long — main.py is a monolith with pre-existing long lines
]

[tool.ruff.lint.isort]
known-first-party = ["apps"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
